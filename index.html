<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sonnyvro | stvlking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: #d1d1d1; overflow-x: hidden; cursor: crosshair; }
        
        /* Loading Screen */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; display: flex; justify-content: center; align-items: center; color: #e60000; font-family: 'Bebas Neue', sans-serif; font-size: 2rem; transition: opacity 0.5s ease; }
        .loader-text { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Effects */
        @keyframes lightning { 0%, 95%, 98% { opacity: 0; } 96% { opacity: 0.15; } 97% { opacity: 0.05; } }
        .lightning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; pointer-events: none; z-index: 10001; animation: lightning 12s linear infinite; }
        .floating-gif { position: fixed; width: 120px; opacity: 0.3; z-index: 0; pointer-events: none; }
        .gif-left { left: 20px; top: 20%; } .gif-right { right: 20px; top: 60%; }
        .gif-top-left { top: 5%; left: 10%; } .gif-top-right { top: 10%; right: 5%; }
        .gif-bottom-left { bottom: 5%; left: 5%; } .gif-bottom-right { bottom: 10%; right: 15%; }
        
        #flashlight { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; background: radial-gradient(circle 1000px at var(--x, 50%) var(--y, 50%), transparent 0%, rgba(0, 0, 0, 0.2) 60%, rgba(0, 0, 0, 0.98) 100%); }
        @media (pointer: coarse) { #flashlight { display: none; } }

        /* UI Elements */
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10002; display: flex; justify-content: center; align-items: center; }
        .enter-btn { padding: 20px 40px; font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; background: transparent; color: #e60000; border: 2px solid #e60000; cursor: pointer; transition: 0.3s; }
        .enter-btn:hover { background: #e60000; color: #fff; }

        .content-filter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); pointer-events: none; z-index: 9998; }
        .overlay-gif { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('wallpaper.gif'); background-size: cover; background-position: center; opacity: 0.1; pointer-events: none; z-index: -1; }

        /* Standard Site Styling */
        section { animation: fadeIn 1.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hero h1 { animation: glow 3s infinite alternate; font-size: 3.5rem; color: #fff; }
        @keyframes glow { from { text-shadow: 0 0 5px #e60000; } to { text-shadow: 0 0 20px #e60000; } }
        .main-container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; position: relative; z-index: 1; }
        h1, h2, h3, .logo, .btn { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 10%; background-color: #111; border-bottom: 2px solid #e60000; position: relative; z-index: 2; }
        .hero { text-align: center; padding: 100px 20px; background: linear-gradient(rgba(5, 5, 5, 0.85), #050505), url('7f67efa80c099233ef3683c793a38249.jpg') no-repeat center center/cover; position: relative; z-index: 1; }
        .btn { display: inline-block; background: #e60000; color: #fff; padding: 12px 30px; border-radius: 3px; font-weight: bold; text-transform: uppercase; }
        .section-title { font-size: 2rem; color: #fff; margin-bottom: 40px; border-left: 5px solid #e60000; padding-left: 15px; }
        .track-card { background-color: #111; border: 1px solid #222; border-radius: 5px; overflow: hidden; transition: 0.3s; }
        .track-card:hover { border-color: #fff; transform: translateY(-5px); }
        .track-art { width: 100%; height: 300px; object-fit: cover; }
        .track-info { padding: 25px; }
        .track-story { background-color: #050505; padding: 15px; border-left: 3px solid #e60000; margin-bottom: 20px; font-size: 0.9rem; color: #aaa; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-top: 40px; }
        .shop-card { background: #111; padding: 30px; border: 1px solid #e60000; border-radius: 5px; text-align: center; }
        .contact-item { background: #111; padding: 20px; border: 1px solid #e60000; border-radius: 5px; width: 200px; }
        footer { text-align: center; padding: 40px; background-color: #111; border-top: 2px solid #e60000; color: #666; position: relative; z-index: 1; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-text">LOADING THE VOID...</div>
    </div>

    <audio id="bg-audio" loop><source src="thunderstorm.mp3" type="audio/mpeg"></audio>

    <div id="start-screen">
        <button class="enter-btn" onclick="startAudio()">ENTER THE VOID</button>
    </div>

    <div class="lightning"></div>
    <div id="flashlight"></div>
    <div class="overlay-gif"></div>
    <div class="content-filter"></div>
    
    <img src="bone.gif" class="floating-gif gif-left">
    <img src="crow.gif" class="floating-gif gif-right">
    <img src="punk.gif" class="floating-gif gif-top-left">
    <img src="spider.gif" class="floating-gif gif-top-right">
    <img src="scorp.gif" class="floating-gif gif-bottom-left">
    <img src="rose.gif" class="floating-gif gif-bottom-right">

    <header>
        <div class="logo"><img src="logo.png" alt="Logo" style="height: 50px;"></div>
        <nav>
            <ul>
                <li><a href="#music">Music</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#shop">Shop</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>SONNYVRO/STVLKING</h1>
        <p>new stuff soon</p>
        <a href="#music" class="btn">enjoy.</a>
    </section>

    <!-- Main content here... -->

    <script>
        // Remove Loading Screen
        window.addEventListener('load', () => {
            const loader = document.getElementById('loading-screen');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 500);
        });

        // Interactive Effects
        const flashlight = document.getElementById('flashlight');
        const audio = document.getElementById('bg-audio');
        const startScreen = document.getElementById('start-screen');

        document.addEventListener('mousemove', (e) => {
            flashlight.style.setProperty('--x', e.clientX + 'px');
            flashlight.style.setProperty('--y', e.clientY + 'px');
        });

        function startAudio() {
            audio.play().then(() => {
                startScreen.style.display = 'none';
            }).catch(error => {
                console.error("Audio playback failed:", error);
            });
        }
    </script>
</body>
</html>
