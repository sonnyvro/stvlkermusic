<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sonnyvro | stvlking</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           🛠️ CUSTOMIZATION DASHBOARD 🛠️
           ========================================= */
        :root {
            --bg-color: #020202;
            --box-bg: #050101;
            --neon-color: #ff0033;
            --neon-core: #ffffff;
            --neon-dim: rgba(255, 0, 51, 0.2);
            --flip-speed: 0.5s;
        }

        /* Girly Theme Variables */
        body.girly-mode { --bg-color: #fce4ec; --box-bg: #f8bbd0; --neon-color: #880e4f; --neon-dim: #f48fb1; color: #880e4f; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: #ccc; overflow-x: hidden; cursor: crosshair; transition: background 0.5s; }

        /* --- BACKGROUND FX --- */
        #bg-video, #bg-gif { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; pointer-events: none; filter: blur(3px) grayscale(90%) brightness(0.6); opacity: 0.2; }
        #clouds-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 50vh; background-image: url('clouds.png'); background-size: cover; background-position: top center; opacity: 0.6; pointer-events: none; z-index: 1; -webkit-mask-image: linear-gradient(to bottom, black 10%, transparent 100%); mask-image: linear-gradient(to bottom, black 10%, transparent 100%); }
        #cracks-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9996; }
        .crack-mark { position: absolute; width: 150px; height: 150px; background: url('https://www.transparenttextures.com/patterns/cracked-glass.png'); opacity: 0.4; pointer-events: none; filter: invert(1) drop-shadow(0 0 5px var(--neon-color)); }
        .rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/rain.png'); opacity: 0.05; pointer-events: none; z-index: 9997; animation: rain-move 10s linear infinite; }
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/noise-lines.png'); opacity: 0.04; pointer-events: none; z-index: 9998; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 0, 0, 0.04)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 1; }
        #logo-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('logo.png'); background-repeat: no-repeat; background-position: center; background-size: 40%; opacity: 0.03; z-index: 1; pointer-events: none; filter: blur(3px); }
        .lightning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--neon-color); pointer-events: none; z-index: 2; animation: lightning 15s linear infinite; mix-blend-mode: overlay; }
        #custom-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9995; background-size: cover; background-position: center; opacity: 0.25; display: none; }

        /* --- HEAVY VHS LOADING SCREEN --- */
        #transition-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 99999; pointer-events: none; opacity: 0; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: opacity 0.2s ease-in-out; }
        #transition-overlay.active { opacity: 1; }
        .vhs-noise { position: absolute; width: 100%; height: 100%; background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.05) 2px, rgba(255,255,255,0.05) 4px); z-index: 1; animation: vhs-jump 0.1s infinite; }
        .vhs-tracking { position: absolute; width: 100%; height: 10vh; background: rgba(255, 255, 255, 0.1); filter: blur(4px); z-index: 2; animation: tracking-scroll 3s infinite linear; }
        .vhs-text { color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 15px; z-index: 3; text-shadow: 3px 0 0 rgba(255,0,0,0.7), -3px 0 0 rgba(0,0,255,0.7); animation: text-flicker 0.1s infinite; }

        @keyframes vhs-jump { 0% { transform: translateY(0); } 50% { transform: translateY(5px); } 100% { transform: translateY(-3px); } }
        @keyframes tracking-scroll { 0% { top: -20%; } 100% { top: 120%; } }
        @keyframes text-flicker { 0%, 100% { opacity: 1; transform: translateX(0); } 50% { opacity: 0.6; transform: translateX(3px); } }
        @keyframes rain-move { from { background-position: 0 0; } to { background-position: 100px 1000px; } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px var(--neon-dim); } 50% { box-shadow: 0 0 25px var(--neon-color); } }
        @keyframes ghostly-glitch { 0%, 100% { text-shadow: 0 0 5px var(--neon-core), 0 0 15px var(--neon-color), 0 0 30px var(--neon-color); opacity: 1; transform: translateX(0); } 50% { text-shadow: 2px 0 8px var(--neon-core), -3px 0 20px var(--neon-color); } }
        @keyframes lightning { 0%, 95%, 98% { opacity: 0; } 96% { opacity: 0.08; } 97% { opacity: 0.02; } }

        /* UI Components */
        h1, h2, h3, p, span, .nav-btn, .shop-card, .upload-label { text-shadow: 0 0 5px var(--neon-dim), 0 0 15px var(--neon-dim); position: relative; z-index: 10; }
        .content-box { background: var(--box-bg); border: 1px solid var(--neon-color); padding: 30px; margin: 20px auto; max-width: 800px; color: #fff; animation: pulse-glow 3s infinite ease-in-out; position: relative; z-index: 5; }
        .nav-btn, .upload-label { background: transparent; border: 1px solid var(--neon-dim); color: inherit; padding: 10px 20px; font-family: 'Bebas Neue'; cursor: pointer; margin: 10px; transition: 0.3s; font-size: 1.2rem; }
        .nav-btn:hover { border-color: var(--neon-color); box-shadow: 0 0 15px var(--neon-color); }
        .shop-card { background: var(--box-bg); border: 1px solid var(--neon-color); padding: 15px 20px; cursor: pointer; color: #fff; text-decoration: none; display: flex; flex-direction: column; align-items: center; width: 220px; min-height: 90px; }
        .enter-btn { padding: 15px 30px; font-family: 'Bebas Neue'; font-size: 2rem; background: transparent; color: var(--neon-color); border: 2px solid var(--neon-color); cursor: pointer; }
        
        /* Host Media List */
        .media-list { display: flex; flex-direction: column; gap: 20px; align-items: center; margin-top: 20px; }
        .media-item { width: 100%; max-width: 500px; border: 3px solid var(--neon-color); border-radius: 15px; }

        .page-section { display: none; }
        .active { display: block; }
        .control-group { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; }
        input[type="color"] { border: none; width: 50px; height: 30px; cursor: pointer; background: none; }
    </style>
</head>
<body>

    <div id="transition-overlay"><div class="vhs-noise"></div><div class="vhs-tracking"></div><div class="vhs-text">TRACKING...</div></div>
    <video id="bg-video" loop muted playsinline><source src="background.mp4" type="video/mp4"></video>
    <img id="bg-gif" style="display: none;" alt="Background GIF">
    <div id="clouds-overlay"></div>
    <div id="custom-overlay"></div>
    <div id="logo-overlay"></div>
    <div id="cracks-container"></div>
    <div class="rain"></div>
    <div class="lightning"></div>
    <audio id="bg-audio" loop></audio>

    <div id="start-screen" style="position: fixed; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center;">
        <button class="enter-btn" onclick="startAudio()">ENTER</button>
    </div>

    <div id="site-wrapper">
        <header style="text-align: center; padding-top: 50px;">
            <h1 class="glitch-text" style="font-size: 4rem;">SONNYVRO/STVLKING</h1>
            <div id="now-playing-text" style="font-family: 'Bebas Neue'; font-size: 1.5rem; margin: 20px 0;"></div>
        </header>

        <main class="main-container">
            <div style="text-align: center;">
                <button class="nav-btn" onclick="showPage('home-section')">HOME</button>
                <button class="nav-btn" onclick="showPage('about-section')">ABOUT ME</button>
                <button class="nav-btn" onclick="accessHost()">HOST</button>
            </div>

            <div id="content-flipper">
                <div id="home-section" class="page-section active">
                    <div style="text-align: center; margin: 40px 0;">
                        <span id="status-text" style="padding: 8px 20px; border: 1px solid #0f0; color: #0f0;">● ACCEPTING CUSTOM WORK</span>
                    </div>

                    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 30px;">
                        <a href="https://air.bi/nXZu4" target="_blank" class="shop-card"><h3 class="glitch-text">STOCK</h3></a>
                        <div class="shop-card" onclick="alert('Contact for Custom Beats!')"><h3 class="glitch-text">Custom Beats</h3></div>
                        <a href="https://cash.app/$sonnyvro" target="_blank" style="text-decoration:none;"><div class="shop-card"><h3 class="glitch-text">Premade Beats</h3></div></a>
                    </div>

                    <div class="content-box" style="border-style: dashed; max-width: 600px;">
                        <h3 style="text-align: center;">⚙️ DEV LIVE OVERLAYS & COLORS</h3>
                        <div class="control-group">
                            <span>Accent Color</span>
                            <input type="color" oninput="updateCSS('--neon-color', this.value)">
                        </div>
                        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
                            <label for="upload-bg" class="upload-label">BG GIF</label>
                            <input type="file" id="upload-bg" accept="image/gif" style="display: none;">
                            <label for="upload-overlay" class="upload-label">OVERLAY</label>
                            <input type="file" id="upload-overlay" accept="image/png" style="display: none;">
                            <label for="upload-clouds" class="upload-label">CLOUDS</label>
                            <input type="file" id="upload-clouds" accept="image/png" style="display: none;">
                        </div>
                    </div>
                </div>

                <div id="about-section" class="page-section">
                    <div class="content-box"><h2>WHO AM I?</h2><p>21, USA. Producing dark, atmospheric beats.</p></div>
                </div>

                <div id="host-section" class="page-section">
                    <div class="content-box">
                        <h2 style="font-family: cursive; margin-bottom: 20px;">♡ Host Media Library ♡</h2>
                        <div class="media-list">
                            <img src="https://via.placeholder.com/500x300" class="media-item" alt="Media">
                            <video src="" class="media-item" controls></video>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const HOST_PASSWORD = "gorevoreandlore"; // CHANGE THIS
        const pageTracks = {
            'home-section': { file: 'killing.mp3', title: 'Now Playing - killing' },
            'about-section': { file: 'letmefall.mp3', title: 'Now Playing - Let Me Fall' }
        };

        function startAudio() { 
            const audio = document.getElementById('bg-audio');
            audio.volume = 0.3; 
            audio.src = pageTracks['home-section'].file;
            audio.play(); 
            document.getElementById('start-screen').style.display = 'none'; 
            document.getElementById('bg-video').play();
        }

        function updateCSS(varName, value) {
            document.documentElement.style.setProperty(varName, value);
            if(varName === '--neon-color') document.documentElement.style.setProperty('--neon-dim', value + '33');
        }

        function accessHost() {
            const pass = prompt("Enter Host Password:");
            if (pass === HOST_PASSWORD) {
                showPage('host-section');
            } else {
                alert("Access Denied");
            }
        }

        function showPage(pageId) {
            if (pageId === 'host-section') {
                document.body.classList.add('girly-mode');
            } else {
                document.body.classList.remove('girly-mode');
            }

            const target = document.getElementById(pageId);
            const transition = document.getElementById('transition-overlay');
            transition.classList.add('active');
            
            setTimeout(() => {
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                target.classList.add('active');
                if (pageTracks[pageId]) {
                    const audio = document.getElementById('bg-audio');
                    audio.src = pageTracks[pageId].file;
                    audio.play();
                }
                setTimeout(() => transition.classList.remove('active'), 200);
            }, 600);
        }

        // Upload Handlers
        document.getElementById('upload-bg').addEventListener('change', e => {
            const url = URL.createObjectURL(e.target.files[0]);
            document.getElementById('bg-video').style.display = 'none';
            const gif = document.getElementById('bg-gif');
            gif.src = url; gif.style.display = 'block';
        });

        document.getElementById('upload-overlay').addEventListener('change', e => {
            document.getElementById('custom-overlay').style.backgroundImage = `url('${URL.createObjectURL(e.target.files[0])}')`;
            document.getElementById('custom-overlay').style.display = 'block';
        });

        document.getElementById('upload-clouds').addEventListener('change', e => {
            document.getElementById('clouds-overlay').style.backgroundImage = `url('${URL.createObjectURL(e.target.files[0])}')`;
        });
    </script>
</body>
</html>
