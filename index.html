<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SONNYVRO // STVLKING</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050101;
            --panel: rgba(15, 5, 5, 0.9);
            --red: #ff3a3a;
            --dim-red: #551111;
            --text: #ffcccc;
        }

        body { background: var(--bg); color: var(--text); font-family: 'VT323', monospace; overflow: hidden; perspective: 1000px; }

        /* 3D CAMERA SYSTEM */
        #viewport { width: 100vw; height: 100vh; }
        #camera { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); }

        /* PAN ANIMATIONS */
        .pan-left { transform: rotateY(90deg) translateZ(200px); opacity: 0; }
        .pan-right { transform: rotateY(-90deg) translateZ(200px); opacity: 0; }
        .pan-up { transform: rotateX(-90deg) translateZ(200px); opacity: 0; }
        .pan-down { transform: rotateX(90deg) translateZ(200px); opacity: 0; }

        /* GRID LAYOUT - Clean & Punctual */
        .layout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: auto auto 1fr;
            gap: 20px;
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        header { grid-column: 1 / -1; text-align: center; margin-bottom: 20px; }
        h1 { font-family: 'Press Start 2P'; color: var(--red); font-size: 2rem; }

        .box { border: 1px solid var(--dim-red); background: var(--panel); padding: 15px; }
        .box-title { font-family: 'Press Start 2P'; font-size: 0.7rem; color: var(--red); margin-bottom: 15px; border-bottom: 1px solid var(--dim-red); padding-bottom: 5px; }

        .links a { display: block; color: var(--text); text-decoration: none; margin: 8px 0; }
        .links a:hover { color: var(--red); }
        .links a::before { content: "> "; }

        .track-item { cursor: pointer; margin-bottom: 5px; }
        .track-item:hover { color: var(--red); }
    </style>
</head>
<body>

<div id="viewport">
    <div id="camera">
        <div class="layout-grid">
            <header>
                <h1>SONNYVRO // STVLKING</h1>
            </header>

            <div class="left-col">
                <section class="box" id="welcome-box">
                    <div class="box-title">🌙 WELCOME</div>
                    <p>Welcome to the digital shrine. Sonny, 21. Music production daily. This is the main terminal.</p>
                </section>

                <section class="box" id="music-box">
                    <div class="box-title">🎵 AUDIO TERMINAL</div>
                    <div class="track-item" onclick="loadTrack(0)">01 - KILLING.MP3</div>
                    <div class="track-item" onclick="loadTrack(1)">02 - CCC.MP3</div>
                    <button class="btn" id="play-btn" onclick="togglePlay()">PLAY / PAUSE</button>
                </section>
            </div>

            <div class="right-col">
                <section class="box" id="directory-box">
                    <div class="box-title">⭐ DIRECTORY</div>
                    <nav class="links">
                        <a href="#" class="nav-link" data-dir="pan-left">Home</a>
                        <a href="#" class="nav-link" data-dir="pan-up">About Me</a>
                        <a href="https://air.bi/nXZu4" target="_blank">Stock Beats</a>
                        <a href="#" class="nav-link" data-dir="pan-down">Misc Archive</a>
                    </nav>
                </section>

                <section class="box" id="activity-box">
                    <div class="box-title">⚡ SYSTEM STATUS</div>
                    <p>ONLINE.</p>
                </section>
            </div>
            
            <section class="box" id="upcoming-box" style="grid-column: 1 / -1;">
                <div class="box-title">📅 UPCOMING</div>
                <p>New 808 slides - Posted on Sunday.</p>
            </section>
        </div>
    </div>

    <script>
        // Camera Panning Logic
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const camera = document.getElementById('camera');
                const dir = this.getAttribute('data-dir');
                camera.classList.add(dir);
                setTimeout(() => { window.location.href = this.getAttribute('href'); }, 1200);
            });
        });

        // Audio Logic
        const audio = new Audio();
        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        function loadTrack(i) { audio.src = i === 0 ? 'music/killing.mp3' : 'ccc.mp3'; audio.play(); }
    </script>
</body>
</html>
