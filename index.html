<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sonnyvro | stvlking</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #020202; color: #888; overflow-x: hidden; cursor: crosshair; }

        /* --- BACKGROUND FX --- */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; pointer-events: none; filter: blur(2px) grayscale(100%); opacity: 0.15; }
        #cracks-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9996; }
        .crack-mark { position: absolute; width: 150px; height: 150px; background: url('https://www.transparenttextures.com/patterns/cracked-glass.png'); opacity: 0.2; pointer-events: none; filter: invert(1); }
        .rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/rain.png'); opacity: 0.05; pointer-events: none; z-index: 9997; animation: rain-move 10s linear infinite; }
        
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/noise-lines.png'); opacity: 0.03; pointer-events: none; z-index: 9998; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 0, 0, 0.03)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 1; }
        
        #logo-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('logo.png'); background-repeat: no-repeat; background-position: center; background-size: 40%; opacity: 0.04; z-index: 1; pointer-events: none; filter: blur(2px); }
        .lightning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; pointer-events: none; z-index: 2; animation: lightning 15s linear infinite; }

        /* --- ANIMATIONS --- */
        @keyframes rain-move { from { background-position: 0 0; } to { background-position: 100px 1000px; } }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(230, 0, 0, 0.2); }
            50% { box-shadow: 0 0 25px rgba(230, 0, 0, 0.4); }
        }
        @keyframes glitch-anim {
            0%, 100% { clip-path: inset(0% 0 0% 0); transform: translate(0); }
            10% { clip-path: inset(80% 0 1% 0); transform: translate(-5px, 5px); }
            30% { clip-path: inset(10% 0 85% 0); transform: translate(5px, -5px); }
            50% { clip-path: inset(30% 0 40% 0); transform: translate(-3px, 2px); }
            70% { clip-path: inset(60% 0 20% 0); transform: translate(3px, -2px); }
        }
        @keyframes lightning { 0%, 95%, 98% { opacity: 0; } 96% { opacity: 0.04; } 97% { opacity: 0.01; } }

        .glitch-effect { animation: glitch-anim 0.4s infinite linear; }

        /* --- UI COMPONENTS --- */
        .content-box { background: #050505; border: 1px solid #330000; padding: 30px; margin: 20px auto; max-width: 800px; color: #aaa; line-height: 1.6; animation: pulse-glow 4s infinite ease-in-out; }
        .page-section { display: none; }
        .active { display: block; }
        
        .nav-btn { background: transparent; border: 1px solid #444; color: #888; padding: 10px 20px; font-family: 'Bebas Neue'; cursor: pointer; margin: 10px; transition: 0.3s; }
        .nav-btn:hover { border-color: #fff; color: #fff; }

        .shop-card { background: #050505; border: 1px solid #330000; padding: 25px; cursor: pointer; transition: 0.4s; color: #888; text-decoration: none; display: block; animation: pulse-glow 4s infinite ease-in-out; }
        .shop-card:hover { border-color: #e60000; background: #080505; color: #fff; box-shadow: 0 0 20px rgba(230, 0, 0, 0.5); }

        .enter-btn { padding: 15px 30px; font-family: 'Bebas Neue'; font-size: 1.5rem; background: transparent; color: #e60000; border: 1px solid #e60000; cursor: pointer; }

        /* --- MODAL --- */
        #service-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100000; justify-content: center; align-items: center; }
        .modal-content { background: #0a0a0a; padding: 40px; border: 1px solid #330000; text-align: center; max-width: 500px; color: #fff; }
        .close-btn { margin-top: 20px; color: #e60000; cursor: pointer; text-transform: uppercase; font-family: 'Bebas Neue'; }
    </style>
</head>
<body>
    </body>
</html>
