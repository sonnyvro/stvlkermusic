<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sonnyvro | stvlking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: #d1d1d1; overflow-x: hidden; }

        /* 1. BACKGROUND LAYER (Fixed & Beneath) */
        #background-effects { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .lightning { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; animation: lightning 12s linear infinite; opacity: 0; }
        @keyframes lightning { 0%, 95%, 98% { opacity: 0; } 96% { opacity: 0.15; } 97% { opacity: 0.05; } }
        .floating-gif { position: absolute; width: 120px; opacity: 0.3; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* 2. CONTENT LAYER (Anchored and organized) */
        #main-wrapper { position: relative; z-index: 10; width: 100%; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 10%; background: #111; border-bottom: 2px solid #e60000; }
        .main-container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }
        
        /* Loading/Start Screens (Topmost) */
        #loading-screen, #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        
        /* All other original styles remain here... */
        .hero { text-align: center; padding: 100px 20px; background: linear-gradient(rgba(5, 5, 5, 0.85), #050505), url('7f67efa80c099233ef3683c793a38249.jpg') no-repeat center center/cover; }
        .music-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .track-card, .shop-card { background: #111; border: 1px solid #333; padding: 20px; }
    </style>
</head>
<body>

    <div id="loading-screen">LOADING...</div>
    <div id="start-screen"><button onclick="start()">ENTER</button></div>

    <div id="background-effects">

    </div>

</body>
</html>
