<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sonnyvro | stvlking</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #020202;
            --box-bg: #050101;
            --neon-color: #ff0033;
            --neon-core: #ffffff;
            --neon-dim: rgba(255, 0, 51, 0.2);
            --flip-speed: 0.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: #ccc; overflow-x: hidden; cursor: crosshair; transition: background 0.3s; }

        #bg-video, #bg-gif { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; pointer-events: none; filter: blur(3px) grayscale(90%) brightness(0.6); opacity: 0.2; }
        
        #clouds-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 50vh; 
            background-size: cover; background-position: top center;
            opacity: 0.6; pointer-events: none; z-index: 1;
            -webkit-mask-image: linear-gradient(to bottom, black 10%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 10%, transparent 100%);
        }

        #cracks-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9996; }
        .crack-mark { position: absolute; width: 150px; height: 150px; background: url('https://www.transparenttextures.com/patterns/cracked-glass.png'); opacity: 0.4; pointer-events: none; filter: invert(1) drop-shadow(0 0 5px var(--neon-color)); }
        .rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/rain.png'); opacity: 0.05; pointer-events: none; z-index: 9997; animation: rain-move 10s linear infinite; }
        
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/noise-lines.png'); opacity: 0.04; pointer-events: none; z-index: 9998; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 0, 0, 0.04)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 1; }
        
        #logo-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('logo.png'); background-repeat: no-repeat; background-position: center; background-size: 40%; opacity: 0.03; z-index: 1; pointer-events: none; filter: blur(3px); }
        .lightning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--neon-color); pointer-events: none; z-index: 2; animation: lightning 15s linear infinite; mix-blend-mode: overlay; }
        #custom-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9995; background-size: cover; background-position: center; opacity: 0.25; display: none; }

        /* --- HEAVY VHS LOADING SCREEN --- */
        #transition-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 99999; pointer-events: none; opacity: 0; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: opacity 0.2s ease-in-out; }
        #transition-overlay.active { opacity: 1; }
        .vhs-noise { position: absolute; width: 100%; height: 100%; background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.05) 2px, rgba(255,255,255,0.05) 4px); z-index: 1; animation: vhs-jump 0.1s infinite; }
        .vhs-tracking { position: absolute; width: 100%; height: 10vh; background: rgba(255, 255, 255, 0.1); filter: blur(4px); z-index: 2; animation: tracking-scroll 3s infinite linear; }
        .vhs-text { color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 15px; z-index: 3; text-shadow: 3px 0 0 rgba(255,0,0,0.7), -3px 0 0 rgba(0,0,255,0.7); animation: text-flicker 0.1s infinite; }

        @keyframes vhs-jump { 0% { transform: translateY(0); } 50% { transform: translateY(5px); } 100% { transform: translateY(-3px); } }
        @keyframes tracking-scroll { 0% { top: -20%; } 100% { top: 120%; } }
        @keyframes text-flicker { 0%, 100% { opacity: 1; transform: translateX(0); } 50% { opacity: 0.6; transform: translateX(3px); } }
        @keyframes rain-move { from { background-position: 0 0; } to { background-position: 100px 1000px; } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px var(--neon-dim), 0 0 30px var(--neon-dim), inset 0 0 10px var(--neon-dim); border-color: rgba(255, 0, 51, 0.4); } 50% { box-shadow: 0 0 25px var(--neon-color), 0 0 60px var(--neon-dim), inset 0 0 20px var(--neon-dim); border-color: var(--neon-color); } }
        @keyframes ghostly-glitch { 0%, 100% { text-shadow: 0 0 5px var(--neon-core), 0 0 15px var(--neon-color), 0 0 30px var(--neon-color); opacity: 1; transform: translateX(0); } 50% { text-shadow: 2px 0 8px var(--neon-core), -3px 0 20px var(--neon-color), 0 0 50px var(--neon-color); opacity: 0.95; transform: translateX(1px); } }
        @keyframes lightning { 0%, 95%, 98% { opacity: 0; } 96% { opacity: 0.08; } 97% { opacity: 0.02; } }

        h1, h2, h3, p, span, .nav-btn, .shop-card, .upload-label { text-shadow: 0 0 5px var(--neon-dim), 0 0 15px var(--neon-dim), 0 0 30px var(--neon-dim); position: relative; z-index: 10; }
        .glitch-text { display: inline-block; animation: ghostly-glitch 2.5s infinite ease-in-out; }

        .content-box { background: var(--box-bg); border: 1px solid var(--neon-color); padding: 30px; margin: 20px auto; max-width: 800px; color: #fff; line-height: 1.6; animation: pulse-glow 3s infinite ease-in-out; position: relative; z-index: 5; }
        #content-flipper { transform-style: preserve-3d; transform-origin: center center; width: 100%; transition: transform var(--flip-speed) cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .page-section { display: none; }
        .active { display: block; }
        
        .nav-btn, .upload-label { background: transparent; border: 1px solid var(--neon-dim); color: #fff; padding: 10px 20px; font-family: 'Bebas Neue'; cursor: pointer; margin: 10px; transition: 0.3s; font-size: 1.2rem; letter-spacing: 2px; display: inline-block; text-align: center; }
        .nav-btn:hover, .upload-label:hover { border-color: var(--neon-color); color: #fff; box-shadow: 0 0 15px var(--neon-color), 0 0 30px var(--neon-color), inset 0 0 10px var(--neon-color); text-shadow: 0 0 8px var(--neon-core), 0 0 20px var(--neon-color); }

        .shop-card { background: var(--box-bg); border: 1px solid var(--neon-color); padding: 15px 20px; cursor: pointer; transition: 0.4s; color: #fff; text-decoration: none; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 220px; min-height: 90px; animation: pulse-glow 3s infinite ease-in-out; text-align: center; position: relative; z-index: 5; }
        .shop-card:hover { border-color: var(--neon-color); background: #110000; box-shadow: 0 0 30px var(--neon-color), 0 0 60px var(--neon-color), inset 0 0 20px var(--neon-color); transform: scale(1.05); }

        .enter-btn { padding: 15px 30px; font-family: 'Bebas Neue'; font-size: 2rem; background: transparent; color: var(--neon-color); border: 2px solid var(--neon-color); cursor: pointer; box-shadow: 0 0 30px var(--neon-color), inset 0 0 15px var(--neon-color); transition: 0.3s; text-shadow: 0 0 10px var(--neon-core), 0 0 20px var(--neon-color); letter-spacing: 5px; }
        .enter-btn:hover { background: var(--neon-color); color: #000; box-shadow: 0 0 50px var(--neon-color), 0 0 100px var(--neon-color); text-shadow: none; }

        .control-group { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; font-family: 'Bebas Neue'; }
        input[type="color"] { border: none; width: 50px; height: 30px; cursor: pointer; background: none; }
    </style>
</head>
<body>
    <div id="transition-overlay">
        <div class="vhs-noise"></div>
        <div class="vhs-tracking"></div>
        <div class="vhs-text">TRACKING...</div>
    </div>

    <video id="bg-video" loop muted playsinline><source src="background.mp4" type="video/mp4"></video>
    <img id="bg-gif" style="display: none;" alt="Background GIF">
    <div id="clouds-overlay"></div>
    <div id="custom-overlay"></div>
    <div id="logo-overlay"></div>
    <div id="cracks-container"></div>
    <div class="rain"></div>
    <div class="lightning"></div>
    
    <audio id="bg-audio" loop></audio>

    <div id="service-modal">
        <div class="modal-content">
            <h2 id="modal-title" class="glitch-text" style="font-size: 2.5rem; margin-bottom: 10px;">Service Details</h2>
            <p id="modal-desc" style="margin: 20px 0; font-size: 1.1rem; line-height: 1.5;"></p>
            <div class="close-btn" onclick="closeModal()">Close</div>
        </div>
    </div>

    <div id="start-screen" style="position: fixed; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center;">
        <button class="enter-btn" onclick="startAudio()">ENTER</button>
    </div>

    <div id="site-wrapper">
        <section style="text-align: center; padding-top: 50px;">
            <h1 class="glitch-text" style="font-size: 4rem; letter-spacing: 8px;">SONNYVRO/STVLKING</h1>
        </section>

        <header style="text-align: center; margin-bottom: 40px; border-bottom: 1px solid var(--neon-dim); padding-bottom: 20px;">
            <div id="now-playing-text" class="glitch-text" style="font-family: 'Bebas Neue'; font-size: 1.5rem; letter-spacing: 3px;"></div>
        </header>

        <main class="main-container" style="perspective: 1200px;">
            <div style="text-align: center; margin-bottom: 40px;">
                <button class="nav-btn" onclick="showPage('home-section')">HOME</button>
                <button class="nav-btn" onclick="showPage('about-section')">ABOUT ME</button>
            </div>

            <div id="content-flipper">
                <div id="home-section" class="page-section active">
                    <div style="text-align: center; margin-bottom: 40px;">
                        <span id="status-text" style="padding: 8px 20px; border: 1px solid #330; font-family: 'Bebas Neue'; font-size: 1.5rem; letter-spacing: 2px; box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);"></span>
                    </div>
                    
                    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 30px;">
                        <a href="https://air.bi/nXZu4" target="_blank" class="shop-card">
                            <h3 class="glitch-text" style="font-size: 1.8rem;">STOCK</h3>
                        </a>
                        <div class="shop-card" onclick="openModal('Custom Beats', 'Custom made for your vision. Price starts at $50+. Contact me to start.')">
                            <h3 class="glitch-text" style="font-size: 1.5rem;">Custom Beats</h3>
                        </div>
                        <a href="https://cash.app/$sonnyvro" target="_blank" style="text-decoration:none;">
                            <div class="shop-card">
                                <h3 class="glitch-text" style="font-size: 1.5rem;">Premade Beats</h3>
                            </div>
                        </a>
                    </div>

                    <div class="content-box" style="margin-top: 60px; border-style: dashed; max-width: 700px;">
                        <h3 class="glitch-text" style="font-family: 'Bebas Neue'; font-size: 1.8rem; margin-bottom: 20px; text-align: center;">⚙️ DEV LIVE OVERLAYS & COLORS</h3>
                        
                        <div class="control-group">
                            <span>Accent Color</span>
                            <input type="color" id="color-accent" value="#ff0033" oninput="updateCSS('--neon-color', this.value)">
                        </div>
                        <div class="control-group">
                            <span>Background Shade</span>
                            <input type="color" id="color-bg" value="#020202" oninput="updateCSS('--bg-color', this.value)">
                        </div>

                        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top:20px;">
                            <label for="upload-bg" class="upload-label">LOAD 8BIT BG GIF</label>
                            <input type="file" id="upload-bg" accept="image/gif, image/*" style="display: none;">
                            <label for="upload-overlay" class="upload-label">LOAD OVERLAY GIF</label>
                            <input type="file" id="upload-overlay" accept="image/gif, image/*" style="display: none;">
                            <label for="upload-clouds" class="upload-label">LOAD TOP CLOUDS</label>
                            <input type="file" id="upload-clouds" accept="image/png, image/jpeg, image/*" style="display: none;">
                        </div>
                    </div>
                </div>

                <div id="about-section" class="page-section">
                    <div class="content-box">
                        <h2 class="glitch-text" style="font-size: 2.5rem; margin-bottom: 20px;">WHO AM I?</h2>
                        <p style="font-size: 1.1rem; margin-bottom: 15px;">hi im sonny. i'm 21 years old and i live in the usa. i specialize in dark, atmospheric beats and custom projects.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const pageTracks = {
            'home-section': { file: 'killing.mp3', title: 'Now Playing - killing (instrumental)' },
            'about-section': { file: 'letmefall.mp3', title: 'Now Playing - Let Me Fall' }
        };
        const audio = document.getElementById('bg-audio');
        const video = document.getElementById('bg-video');
        const bgGif = document.getElementById('bg-gif');
        const customOverlay = document.getElementById('custom-overlay');
        const cloudsOverlay = document.getElementById('clouds-overlay');
        const nowPlayingDisplay = document.getElementById('now-playing-text');
        const statusEl = document.getElementById('status-text');

        statusEl.innerText = "● ACCEPTING CUSTOM WORK";
        statusEl.style.color = "#00ff00";

        function updateCSS(varName, value) {
            document.documentElement.style.setProperty(varName, value);
            if(varName === '--neon-color') document.documentElement.style.setProperty('--neon-dim', value + '33');
        }

        function startAudio() { 
            audio.volume = 0.3; 
            audio.src = pageTracks['home-section'].file;
            nowPlayingDisplay.innerText = pageTracks['home-section'].title;
            audio.play(); 
            if (video.style.display !== 'none') video.play();
            document.getElementById('start-screen').style.display = 'none'; 
        }

        const transition = document.getElementById('transition-overlay');
        
        function showPage(pageId) {
            const targetSection = document.getElementById(pageId);
            if (targetSection.classList.contains('active')) return;
            const flipper = document.getElementById('content-flipper');
            
            transition.classList.add('active');
            flipper.style.transform = 'rotateX(90deg)';
            
            setTimeout(() => {
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                targetSection.classList.add('active');
                if (pageTracks[pageId]) {
                    audio.src = pageTracks[pageId].file;
                    nowPlayingDisplay.innerText = pageTracks[pageId].title;
                    audio.play();
                }
                flipper.style.transition = 'none';
                flipper.style.transform = 'rotateX(-90deg)';
                void flipper.offsetWidth; 
                flipper.style.transition = 'transform var(--flip-speed) cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                flipper.style.transform = 'rotateX(0deg)';
                setTimeout(() => transition.classList.remove('active'), 200); 
            }, 600); 
        }

        function openModal(t, d) { document.getElementById('modal-title').innerText = t; document.getElementById('modal-desc').innerText = d; document.getElementById('service-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('service-modal').style.display = 'none'; }
        
        document.addEventListener('click', function(e) {
            if (e.target.closest('#service-modal') || e.target.closest('a') || e.target.closest('button') || e.target.closest('.upload-label')) return;
            const crack = document.createElement('div');
            crack.className = 'crack-mark';
            crack.style.left = (e.clientX - 75) + 'px';
            crack.style.top = (e.clientY - 75) + 'px';
            crack.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
            document.getElementById('cracks-container').appendChild(crack);
            setTimeout(() => { crack.style.transition = "opacity 1.5s"; crack.style.opacity = "0"; setTimeout(() => crack.remove(), 1500); }, 1500);
        });

        document.getElementById('upload-bg').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                video.style.display = 'none';
                bgGif.src = url;
                bgGif.style.display = 'block';
            }
        });

        document.getElementById('upload-overlay').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                customOverlay.style.backgroundImage = `url('${url}')`;
                customOverlay.style.display = 'block';
            }
        });
        
        document.getElementById('upload-clouds').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                cloudsOverlay.style.backgroundImage = `url('${url}')`;
            }
        });
    </script>
</body>
</html>
